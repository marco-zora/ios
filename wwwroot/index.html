<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorApp_IOS</title>

    <base href="/ios/" />

    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorApp_IOS.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />

    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body>

    <div id="app">

        <!-- ✅ Loader Blazor corretto -->
        <div class="loading-progress">
            <svg viewBox="0 0 100 100" aria-hidden="true">
                <circle cx="50" cy="50" r="45"></circle>
                <circle cx="50" cy="50" r="45"></circle>
            </svg>
        </div>

        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- ai nomi dei file viene aggiunto un fingerprint (impostato su BlazorApp_IOS.csproj) quindi bisogna cercare i file con i nomi corretti -->
    <!-- <script src="_framework/blazor.webassembly.js"></script> -->
        <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

        <script>
            // Register Service Worker SOLO fuori da localhost
            if ('serviceWorker' in navigator &&
                !location.hostname.includes('localhost') &&
                !location.hostname.includes('127.0.0.1')) {

                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered with scope:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            }
        </script>

    </body>
    </html>
